<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="game-shell" aria-label="Sudoku game">
      <header class="topbar">
        <div>
          <p class="eyebrow">Classic puzzle</p>
          <h1>Sudoku</h1>
        </div>
        <div class="stats" aria-label="Game status">
          <span id="timer">00:00</span>
          <span id="mistakes">Mistakes 0/3</span>
        </div>
      </header>

      <div class="controls" aria-label="Game controls">
        <label>
          Difficulty
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <button id="new-game" type="button">New Game</button>
        <button id="hint" type="button">Hint</button>
        <button id="reset" type="button">Reset</button>
      </div>

      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="Sudoku board"></div>
      </div>

      <div id="number-pad" class="number-pad" aria-label="Number pad"></div>
      <p id="message" class="message" role="status" aria-live="polite">Select a cell to begin.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
